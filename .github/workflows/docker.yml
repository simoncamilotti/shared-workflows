name: Docker Build & Deploy

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of images to build, e.g. [{"name":"api","dockerfile":"apps/api/Dockerfile"}]'
        type: string
        required: true

jobs:
  build:
    if: vars.DOCKER_MANUAL_ONLY != 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJson(inputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ env.REPO }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=raw,value=${{ github.ref_name }}-${{ github.run_id }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Update image tags
        working-directory: gitops/apps/${{ github.event.repository.name }}/overlays/dev
        env:
          IMAGES: ${{ inputs.images }}
        run: |
          TAG="${GITHUB_REF_NAME}-${GITHUB_RUN_ID}"
          REPO="${GITHUB_REPOSITORY,,}"
          CMD="kustomize edit set image"
          for IMAGE in $(echo "$IMAGES" | jq -r '.[].name'); do
            CMD="$CMD ghcr.io/${REPO}/${IMAGE}=ghcr.io/${REPO}/${IMAGE}:${TAG}"
          done
          eval $CMD

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "deploy(dev): ${{ github.event.repository.name }} images to ${GITHUB_REF_NAME}-${GITHUB_RUN_ID}"
          git push

      - name: Notify Slack
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ github.event.repository.name }} deployed to dev :rocket:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.event.repository.name }} deployed to dev* :rocket:\nTag `${{ github.ref_name }}-${{ github.run_id }}` pushed to GitOps (dev overlay).\nContains `${{ github.event.head_commit.message }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: build
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Update image tags
        working-directory: gitops/apps/${{ github.event.repository.name }}/overlays/prod
        env:
          IMAGES: ${{ inputs.images }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO="${GITHUB_REPOSITORY,,}"
          CMD="kustomize edit set image"
          for IMAGE in $(echo "$IMAGES" | jq -r '.[].name'); do
            CMD="$CMD ghcr.io/${REPO}/${IMAGE}=ghcr.io/${REPO}/${IMAGE}:${VERSION}"
          done
          eval $CMD

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "deploy(prod): ${{ github.event.repository.name }} images to ${GITHUB_REF_NAME}"
          git push

      - name: Notify Slack
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ github.event.repository.name }} deployed to prod :white_check_mark:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.event.repository.name }} deployed to prod* :white_check_mark:\nVersion `${{ github.ref_name }}` pushed to GitOps (prod overlay).\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }
